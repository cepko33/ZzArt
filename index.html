<!doctype html>
<html>

<head>
<link rel="stylesheet" href="/src/styles.css" />
<title>ZzArt - Abstract Art Evolution</title>
<link rel="shortcut icon" type="image/x-icon" href="favicon.png"/>
<meta name="author" content="Frank Force">
<meta charset="utf-8">
</head>
<body bgcolor="#222">
<tag autocomplete=off autocorrect=off autocapitalize=off spellcheck=false/>
<div id=div_satellite class=satellite>
<button id=button_satelliteHelp class=satellite onclick=ButtonSatelliteHelp() title="Help">📡</button>
<button id=button_satelliteSave class=satellite onclick=ButtonSave() title="Save HD Image [S]">💾</button>
<button id=button_satelliteFeedback class=satellite onclick=ButtonToggleFeedback() title="Toggle Feedback">🌀</button>
<font size=10><b>𝓩𝔃𝓐𝓻𝓽</b> - <span id=span_generationsSatellite>0</span></font><br></div>
<center>
<div id=div_title><font size=5><b>𝓩𝔃𝓐𝓻𝓽</b></font> - <span id=span_generations>0</span></div>
<div id=buttons_top>
<button class=small id=button_preview disabled onclick=ButtonTogglePreview() title="Toggle Preview [Spacebar]">🔍</button>
<button class=small id=button_feedback disabled onclick=ButtonToggleFeedback() title="Toggle Feedback [F]">🌀</button>
<button class=small id=button_back disabled onclick=ChangeMemoryLocation(-1) title="Undo [Z]">◄</button>
<button class=small id=button_forward disabled onclick=ChangeMemoryLocation(1) title="Redo [X]">►</button>
<button class=small id=button_save onclick=ButtonSave() title="Save HD Image [S]">💾</button>
<button class=small style="display:none;" id=button_saveFolder onclick=DisplaySaveListPage() title="Show Next Save Folder Page">📁</button>
<button class=small id=button_randomize onclick=ButtonRandomize() title="Randomize [R]">🎲</button>
<button class=small id=button_share onclick=ButtonShare() title="Copy Link To Clipboard">🔗</button>
<button class=small style="display:none;" id=button_seed onclick=ButtonSeed() title="Enter Seed">🌱</button>
<button class=small id=button_openSatellite onclick=ButtonSatellite() title="Open Satellite Preview">📡</button>
<button class=small id=button_advanced onclick=ButtonAdvanced() title="Advanced Controls">🔧</button>
<button class=small id=button_help onclick=ButtonHelp() title="Help">❓</button>
<button class=small style="display:none;" id=button_delete onclick=DeleteSelectedSave() title="Delete Selected Save">␡</button>
<br></div>
<canvas id=canvas_main width=1920 height=1080 style="width:1280px; height:720px; border:2px solid black;"></canvas>
<canvas id=canvas_shader hidden style="width:1280px; height:720px; border:2px solid black;"></canvas>
<canvas id=canvas_save hidden style="width:1280px; height:720px; border:2px solid black;"></canvas>
<br>
<div id=div_credit><font size=3>ZzArt © <a href="http://www.frankforce.com" target="_blank">Frank Force</a> 2019 ☮♥☻␌</font></div>
<div id=div_advanced style="display:none;"><hr>
<div class="advanced-container">
    <!-- Generation & App Settings -->
    <div class="advanced-column settings-column">
        <div class="advanced-group">
            <h3>⚙️ Settings</h3>
            <div class="control-row">
                <label><input id=checkbox_showWatermark onclick=UpdateUI() type=checkbox> Watermark</label>
                <label><input id=checkbox_feedbackClear type=checkbox checked onchange=UpdateFeedbackUI()> Clear on Change</label>
            </div>
            <div class="control-row">
                <span>Save Scale:</span>
                <input type=number id=input_saveScale class=advanced value=2>
            </div>
            <div class="control-row">
                <span>Grid Size:</span>
                <input type=number onchange=SetGridSize(parseInt(input_gridSize.value)) id=input_gridSize class=advanced value=5>
            </div>
            <div class="control-row">
                <span>Start Iters:</span>
                <input type=number id=input_startIterations class=advanced value=1>
            </div>
            <div class="control-row">
                <span>Rand Len:</span>
                <input type=number id=input_randomizeLength class=advanced value=15>
            </div>
        </div>
        <div class="advanced-group buttons-group">
            <button class="action-button" onclick=OpenCapJS()>CapJS</button>
            <button class="action-button" onclick=ExportSaveList()>Export</button>
            <button class="action-button" onclick=input_importFile.click()>Import</button>
            <input id=input_importFile type="file" style="display:none">
            <button class="action-button danger" onclick=DeleteSelectedSave()>Delete</button>
        </div>
    </div>

    <!-- Saved Shaders -->
    <div class="advanced-column saves-column">
        <div class="advanced-group">
            <h3>💾 Saved Shaders</h3>
            <select id=select_saveList onchange=SelectSavedShader(select_saveList.selectedIndex) size=10></select>
        </div>
    </div>

    <!-- Feedback Controls -->
    <div class="advanced-column feedback-column">
        <div class="advanced-group">
            <h3>🌀 Feedback</h3>
            <div class="control-row">
                <label><input id=checkbox_useFeedback type=checkbox onchange=UpdateFeedbackUI()> <b>Enable</b></label>
                <label><input id=checkbox_feedbackSwap type=checkbox onchange=UpdateFeedbackUI()> Swap</label>
            </div>
            
            <div class="control-row">
                <span>Blend:</span>
                <select id=select_feedbackBlendMode onchange=UpdateFeedbackUI()>
                    <option value=0>0 - Mix</option>
                    <option value=1>1 - Additive</option>
                    <option value=2>2 - Multiply</option>
                    <option value=3>3 - Screen</option>
                    <option value=4>4 - Difference</option>
                    <option value=5>5 - Lighten</option>
                    <option value=6>6 - Darken</option>
                    <option value=7>7 - Burn</option>
                    <option value=8>8 - Atop</option>
                </select>
            </div>

            <div class="control-row slider-row">
                <span>Mix: <span id=span_feedbackAmount>0.92</span></span>
                <input id=range_feedbackAmount type=range min=0.5 max=0.99 step=0.01 value=0.92 oninput=UpdateFeedbackUI()>
            </div>

            <div class="control-row">
                <span>Mask:</span>
                <select id=select_feedbackMaskType onchange=UpdateFeedbackUI()>
                    <option value=0>0 - None</option>
                    <option value=1>1 - Luminance</option>
                    <option value=2>2 - Red Channel</option>
                    <option value=3>3 - Edge Detect</option>
                    <option value=4>4 - Hue Distance</option>
                    <option value=5>5 - Alpha Channel</option>
                    <option value=6>6 - Chroma Key</option>
                </select>
            </div>

            <div id=div_chromaSettings class="chroma-settings" style="display:none;">
                <div class="control-row">
                    <span>Key:</span>
                    <select id=select_feedbackChromaMode onchange=UpdateFeedbackUI()>
                        <option value=0>RGB</option>
                        <option value=1>Hue</option>
                        <option value=2>Sat</option>
                        <option value=3>Val</option>
                    </select>
                    <input type=color id=input_feedbackChromaKeyColor oninput=UpdateFeedbackUI() value="#00FF00">
                </div>
                <div class="control-row slider-row">
                    <span>Thr: <span id=span_feedbackChromaThreshold>0.10</span></span>
                    <input id=range_feedbackChromaThreshold type=range min=0 max=1 step=0.01 value=0.1 oninput=UpdateFeedbackUI()>
                </div>
                <div class="control-row slider-row">
                    <span>Soft: <span id=span_feedbackChromaSoftness>0.10</span></span>
                    <input id=range_feedbackChromaSoftness type=range min=0 max=1 step=0.01 value=0.1 oninput=UpdateFeedbackUI()>
                </div>
            </div>

            <div class="control-row">
                <span>Order:</span>
                <select id=select_feedbackOpOrder onchange=UpdateFeedbackUI()>
                    <option value=0>0 - Std</option>
                    <option value=1>1 - Msk→Gt</option>
                    <option value=2>2 - InvM→Gt</option>
                    <option value=3>3 - Wrp→Msk</option>
                    <option value=4>4 - Msk→UV</option>
                    <option value=5>5 - Mod↔Amt</option>
                </select>
            </div>

            <div class="control-row">
                <span>Mod:</span>
                <select id=select_feedbackModType onchange=UpdateFeedbackUI()>
                    <option value=0>0 - None</option>
                    <option value=1>1 - Distort</option>
                    <option value=2>2 - Displace</option>
                    <option value=3>3 - Zoom</option>
                    <option value=4>4 - Rotate</option>
                </select>
            </div>

            <div class="control-row slider-row">
                <span>Amt: <span id=span_feedbackModAmount>0.30</span></span>
                <input id=range_feedbackModAmount type=range min=0 max=1 step=0.01 value=0.3 oninput=UpdateFeedbackUI()>
            </div>
        </div>
    </div>

    <!-- Technical Output -->
    <div class="advanced-column technical-column">
        <div class="advanced-group">
            <h3>📜 GLSL Code</h3>
            <textarea disabled id=textarea_code rows=8></textarea>
            <textarea disabled hidden id=textarea_debug style="color:#F00;" rows=4></textarea>
            <h3 style="margin-top:10px;">🔗 Base 64 JSON</h3>
            <textarea disabled id=textarea_json rows=4></textarea>
        </div>
    </div>
</div></div>

</center>

<script type="module" src="/src/main.js"></script>
</body>
</html>
